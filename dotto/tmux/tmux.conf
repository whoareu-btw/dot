# Change ctrl+b bind
unbind C-b
set-option -g prefix M-w
bind M-w send-prefix

# Mouse on
set -g mouse on
unbind -n MouseDrag1Pane
unbind -T copy-mode-vi MouseDrag1Pane
unbind -T copy-mode MouseDrag1Pane
unbind -n MouseDown1Pane
unbind -n MouseDown1Status
unbind -n MouseDown3Pane
bind -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down
bind -T copy-mode WheelUpPane send-keys -X scroll-up
bind -T copy-mode WheelDownPane send-keys -X scroll-down
set-window-option -g mode-style "fg=blue"

# Change slpit bind
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Close pane
bind -n M-q kill-pane

# Reload tmux configuration
bind r source-file ~/.tmux.conf

# Key bind to change focus
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D 

# Focus and unfocus pane color
set -g pane-border-style 'fg=black'
set -g pane-active-border-style 'fg=blue'

# Statusbar color
set -g status-style 'fg=blue'
